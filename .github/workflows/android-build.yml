name: Build Android App Bundle

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build Android app
        run: |
          bubblewrap init --manifest=https://eitanisrael.github.io/Tweetelligent/manifest.webmanifest
          bubblewrap build

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: "**/*.aab"